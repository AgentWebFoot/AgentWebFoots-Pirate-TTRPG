<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        

    </head>

    <body>

        <div id="root"></div>

        <style>
            .app {
                display: grid;
                grid-template-rows: 90px 1fr;
                grid-template-columns: 320px 1fr;
                height: 100vh;
            }

            .topbar {
                grid-column: 1 / span 2;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 20px;
                border-bottom: 2px solid #ccc;
            }

            .leftpanel {
                padding: 10px;
                overflow-y: auto;
                border-right: 2px solid #ccc;
            }

            .mainpage {
                padding: 20px;
            }

            .statRow{
                display:flex;
                gap:30px;
            }

            .statBlock{
                min-width:120px;
            }
        </style>

        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


        <script type="text/babel">
            const stats = {
                Brawn: ["Rigging","Lifting","Pinning","Swimming"],
                Finesse: ["Acrobatics","Skulduggery","Sneaking"],
                Grit: ["Nausea","Resilience","Tolerance"],
                Awareness: ["Fishing","Investigation","Intuition","Tracking"],
                Brains: ["History","Learning","Tinkering"],
                Swagger: ["Infamy","Influence","Negotiation"]
            }

            const STAT_LIST = [
                "Brawn",
                "Finesse",
                "Grit",
                "Awareness",
                "Brains",
                "Swagger"
            ]

            const LEVEL_POINTS = level => level === 1 ? 10 : 1
            const LEVEL_STAT_CAP = level => level === 1 ? 5 : 10

            function MainPage({statTotals,classCounts}) {
                return (
                <div className="mainpage">

                <div className="statRow">
                {Object.entries(stats).map(([stat,skills])=>(
                <div className="statBlock" key={stat}>

                <h3>{stat}</h3>

                <input
                type="number"
                value={statTotals[stat]}
                readOnly
                />

                <ul>
                {skills.map(skill=>(
                <li key={skill}>{skill}</li>
                ))}
                </ul>

                </div>
                ))}
                </div>

                <div style={{marginTop:"30px"}}>

                <h3>Class Ranks</h3>

                <ul>
                {Object.entries(classCounts).map(([cls,count])=>(
                <li key={cls}>
                {cls} - {count}
                </li>
                ))}
                </ul>

                </div>

                </div>
                )
                }

            function TopBar({name,setName,country,setCountry,level}) {
                return (
                    <div className="topbar">

                    <div>
                        <div>
                        Name:
                        <input value={name} onChange={e=>setName(e.target.value)} />
                        </div>

                        <div>
                        Country of Origin:
                        <input value={country} onChange={e=>setCountry(e.target.value)} />
                        </div>
                    </div>

                    <div>
                        Level: {level}
                    </div>

                    </div>
                )
            }

            const classGroups = [
                {
                    title:"Fighters",
                    classes:[
                    "Basher","Brute","Cleaver","Marksman",
                    "Martial Artist","Sharpshooter","Spearman","Swordsman"
                    ]
                },
                {
                    title:"Artisans",
                    classes:[
                    "Alchemist","Blacksmith","Carpenter","Chef",
                    "Farmer","Fisherman","Grenadier","Trapper"
                    ]
                },
                {
                    title:"Scholars",
                    classes:[
                    "Clergyman","Doctor","Ecologist","Musician",
                    "Navigator","Noble"
                    ]
                }
            ]

            const allClasses = classGroups.flatMap(g=>g.classes)
                function LeftPanel({
                    statTotals,
                    setStatTotals,
                    levelStats,
                    setLevelStats,
                    levels,
                    setLevels,
                    level1,
                    setLevel1
                    }) {

                        const selectedClasses = [
                            ...level1,
                            ...levels
                            ].filter(Boolean)

                            const classCounts = {}

                            selectedClasses.forEach(cls=>{
                            classCounts[cls] = (classCounts[cls] || 0) + 1
                        })

                        function updateLevel(index,value){
                            const copy=[...levels]
                            copy[index]=value
                            setLevels(copy)
                        }

                        function updateLevel1(index,value){
                            const copy=[...level1]
                            copy[index]=value
                            setLevel1(copy)
                        }

                        return(
                            <div className="leftpanel">

                            {/* Level 1 */}

                            <div>
                                <h3>Level 1</h3>

                                {[0,1,2].map(i=>(
                                <select
                                    key={i}
                                    value={level1[i]}
                                    onChange={e=>updateLevel1(i,e.target.value)}
                                >

                                    <option value="">Select Class</option>

                                    {classGroups.map(group => (
                                    <optgroup key={group.title} label={group.title}>
                                        {group.classes
                                        .filter(c => !level1.includes(c) || level1[i] === c)
                                        .map(c => (
                                            <option
                                                key={c}
                                                disabled={
                                                (classCounts[c] || 0) >= 5 && level1[i] !== c
                                                }
                                                >
                                                {c}
                                                </option>
                                        ))
                                        }
                                    </optgroup>
                                    ))}

                                </select>

                                
                                ))}

                                <div className="statButtons">
                                    {STAT_LIST.map(stat=>(
                                    <div key={stat}>

                                    <button onClick={()=>
                                    removeStat(
                                    1,
                                    stat,
                                    statTotals,
                                    setStatTotals,
                                    levelStats,
                                    setLevelStats
                                    )
                                    }>-</button>

                                    <span>
                                    {stat} ({levelStats[0][stat]})
                                    </span>

                                    <button onClick={()=>
                                    addStat(
                                    1,
                                    stat,
                                    statTotals,
                                    setStatTotals,
                                    levelStats,
                                    setLevelStats
                                    )
                                    }>+</button>

                                    </div>
                                    ))}

                                    </div>

                            </div>             

                            {/* Levels 2–20 */}

                            {Array.from({length:19},(_,i)=>{

                                const level=i+2

                                return(
                                <div key={level}>
                                    <h3>Level {level}</h3>

                                    <select
                                    value={levels[level-1]||""}
                                    onChange={e=>updateLevel(level-1,e.target.value)}
                                    >

                                    <option value="">Select Class</option>

                                    {classGroups.map(group=>(
                                        <optgroup key={group.title} label={group.title}>
                                        {group.classes.map(c=>(
                                            <option
                                                key={c}
                                                disabled={
                                                (classCounts[c] || 0) >= 5 && levels[level-1] !== c
                                                }
                                                >
                                                {c}
                                            </option>
                                        ))}
                                        </optgroup>
                                    ))}

                                    </select>
                                    <div className="statButtons">

                                    {STAT_LIST.map(stat=>(
                                    <div key={stat}>

                                    <button onClick={()=>
                                        removeStat(
                                        level,
                                        stat,
                                        statTotals,
                                        setStatTotals,
                                        levelStats,
                                        setLevelStats
                                        )
                                        }>-</button>

                                    <span>
                                    {stat} ({levelStats[level-1][stat]})
                                    </span>

                                    <button onClick={()=>
                                        addStat(
                                        level,
                                        stat,
                                        statTotals,
                                        setStatTotals,
                                        levelStats,
                                        setLevelStats
                                        )
                                        }>+</button>

                                    </div>
                                    ))}
                                </div>
                                </div>
                                )
                            })}
                            </div>
                        )
                }

            function addStat(level,stat,statTotals,setStatTotals,levelStats,setLevelStats){
                const levelIndex = level-1

                const spent = Object.values(levelStats[levelIndex]).reduce((a,b)=>a+b,0)
                const levelLimit = LEVEL_POINTS(level)

                if(spent >= levelLimit) return
                if(statTotals[stat] >= 10) return
                if(level === 1 && levelStats[levelIndex][stat] >= 5) return

                const newLevelStats=[...levelStats]
                newLevelStats[levelIndex][stat]++

                const newTotals={...statTotals}
                newTotals[stat]++

                setLevelStats(newLevelStats)
                setStatTotals(newTotals)
            }

            function removeStat(level,stat,statTotals,setStatTotals,levelStats,setLevelStats){

                const levelIndex = level-1
                if(levelStats[levelIndex][stat] <= 0) return

                const newLevelStats=[...levelStats]
                newLevelStats[levelIndex][stat]--

                const newTotals={...statTotals}
                newTotals[stat]--

                setLevelStats(newLevelStats)
                setStatTotals(newTotals)
            }

            function App(){
                const [name,setName] = React.useState("")
                const [country,setCountry] = React.useState("")
                const level = 1

                const [statTotals,setStatTotals] = React.useState({
                    Brawn:0,
                    Finesse:0,
                    Grit:0,
                    Awareness:0,
                    Brains:0,
                    Swagger:0
                })
                const [levels,setLevels] = React.useState(Array(20).fill(null))
                const [level1,setLevel1] = React.useState(["","",""])

                const [levelStats,setLevelStats] = React.useState(
                    Array.from({length:20},()=>({
                    Brawn:0,
                    Finesse:0,
                    Grit:0,
                    Awareness:0,
                    Brains:0,
                    Swagger:0
                    }))
                )

                const selectedClasses = [...level1, ...levels].filter(Boolean)

                const classCounts = {}

                selectedClasses.forEach(cls=>{
                classCounts[cls] = (classCounts[cls] || 0) + 1
                })

                return(
                    <div className="app">

                    <TopBar
                        name={name}
                        setName={setName}
                        country={country}
                        setCountry={setCountry}
                        level={level}
                    />

                    <LeftPanel
                        statTotals={statTotals}
                        setStatTotals={setStatTotals}
                        levelStats={levelStats}
                        setLevelStats={setLevelStats}
                        levels={levels}
                        setLevels={setLevels}
                        level1={level1}
                        setLevel1={setLevel1}
                    />

                    <MainPage
                        statTotals={statTotals}
                        classCounts={classCounts}
                        />

                    </div>
                )
            }
            
            ReactDOM.createRoot(document.getElementById("root")).render(<App />);
        </script>
    </body>

</html>
