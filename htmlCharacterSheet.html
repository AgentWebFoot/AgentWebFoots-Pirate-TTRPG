<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        

    </head>

    <body>

        <div id="root"></div>

        <style>
            .app {
                display: grid;
                grid-template-rows: 90px 1fr;
                grid-template-columns: 320px 1fr;
                height: 100vh;
            }

            .topbar {
                grid-column: 1 / span 2;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 20px;
                border-bottom: 2px solid #ccc;
            }

            .leftpanel {
                padding: 10px;
                overflow-y: auto;
                border-right: 2px solid #ccc;
            }

            .mainpage {
                padding: 20px;
            }

            .statRow{
                display:flex;
                gap:30px;
            }

            .statBlock{
                min-width:120px;
            }
        </style>

        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


        <script type="text/babel">
            const stats = {
                Brawn:["Rigging","Lifting","Pinning","Swimming"],
                Finesse:["Acrobatics","Skulduggery","Sneaking"],
                Grit:["Nausea","Resilience","Tolerance"],
                Awareness:["Fishing","Investigation","Intuition","Tracking"],
                Brains:["History","Learning","Tinkering"],
                Swagger:["Infamy","Influence","Negotiation"]
            }

            const SKILL_TO_STAT = {}
                Object.entries(stats).forEach(([stat,skills])=>{
                skills.forEach(skill=>{
                SKILL_TO_STAT[skill] = stat
                })
            })

            const STAT_LIST = [
                "Brawn",
                "Finesse",
                "Grit",
                "Awareness",
                "Brains",
                "Swagger"
            ]
            const SKILL_LIST = {
                Brawn:["Rigging","Lifting","Pinning","Swimming"],
                Finesse:["Acrobatics","Skulduggery","Sneaking"],
                Grit:["Nausea","Resilience","Tolerance"],
                Awareness:["Fishing","Investigation","Intuition","Tracking"],
                Brains:["History","Learning","Tinkering"],
                Swagger:["Infamy","Influence","Negotiation"]
            }

            const LEVEL_POINTS = level => level === 1 ? 10 : 1
            const LEVEL_STAT_CAP = level => level === 1 ? 5 : 10

            
            const LEVEL_SKILL_POINTS = level => level === 1 ? 10 : 2

            const ARMOR_STATS = {
                "No Armor": { 
                    baseEvasion:16, 
                    toughness:0 
                },
                "Leather Armor": { 
                    baseEvasion:14, 
                    toughness:2 
                },
                "Chain Mail": { 
                    baseEvasion:12, 
                    toughness:3 
                },
                "Plate Armor": { 
                    baseEvasion:10, 
                    toughness:4 
                }
            }

            const SHIELD_STATS = {
                "No Shield":{
                toughness:0,
                braceCost:0,
                properties:[]
                },
                "Buckler":{
                toughness:1,
                braceCost:2,
                properties:["Attachable","Parry"]
                },
                "Round Shield":{
                toughness:2,
                braceCost:3,
                properties:[]
                },
                "Tower Shield":{
                toughness:4,
                braceCost:4,
                properties:[]
                }
            }

            function MainPage({
                finalStats,
                classCounts,
                skillTotals,
                currentLevel,
                levelSkills,
                setLevelSkills,
                availableSkillPoints,
                armor,
                setArmor,
                shield,
                setShield,
                shieldStats,
                weapons,
                equippedWeapons,
                removeWeapon,
                inventoryWeapons,
                swapWeapon,
                weaponChoice,
                setWeaponChoice,
                addWeaponToInventory,
                settings,
                setSettings
                }) {

                const [activeTab,setActiveTab] = React.useState("class")

                return (
                <div className="mainpage">

                <div className="statRow">
                {Object.entries(stats).map(([stat,skills])=>(
                <div className="statBlock" key={stat}>

                <h3>{stat}</h3>

                <input
                type="number"
                value={Number.isFinite(finalStats[stat]) ? finalStats[stat] : 0}
                readOnly
                />

                <ul>
                    {skills.map(skill=>(
                    <li key={skill}>

                    {skill}

                    <input
                    type="number"
                    value={Number.isFinite(skillTotals[skill]) ? skillTotals[skill] : 0}
                    readOnly
                    />

                    

                    <div>

                        <button onClick={()=>removeSkill(currentLevel,skill,levelSkills,setLevelSkills)}>-</button>

                        <span>
                        {levelSkills
                            .slice(0,currentLevel)
                            .reduce((sum,lvl)=>sum + lvl[skill],0)}
                        </span>

                        <button onClick={()=>addSkill(currentLevel,skill,levelSkills,setLevelSkills,availableSkillPoints)}>+</button>

                    </div>

                    </li>
                    ))}
                </ul>

                </div>
                ))}
                </div>

                <div style={{marginBottom:"15px"}}>
                    <strong>Available Skill Points:</strong> {availableSkillPoints}
                </div>

                <div style={{marginTop:"30px"}}>

                <div style={{display:"flex",gap:"10px",marginBottom:"10px"}}>

                <button onClick={()=>setActiveTab("class")}>Class</button>
                <button onClick={()=>setActiveTab("combat")}>Combat</button>
                <button onClick={()=>setActiveTab("settings")}>Settings</button>

                </div>

                <div>

                {activeTab === "class" && (
                <div>

                <h3>Class Ranks</h3>

                <ul>
                {Object.entries(classCounts).map(([cls,count])=>(
                <li key={cls}>
                {cls} - {count}
                </li>
                ))}
                </ul>

                </div>
                )}

                {activeTab === "combat" && (
                    <div>

                    <h3>Combat</h3>

                   <div style={{display:"flex",gap:"40px"}}>

                    <div>

                    <label>Armor: </label>

                    <select
                    value={armor}
                    onChange={e=>setArmor(e.target.value)}
                    >

                    <option>No Armor</option>
                    <option>Leather Armor</option>
                    <option>Chain Mail</option>
                    <option>Plate Armor</option>

                    </select>

                    <div style={{marginTop:"8px"}}>
                    Base Evasion: {ARMOR_STATS[armor].baseEvasion} + ½ Finesse
                    <br/>
                    Toughness Bonus: +{ARMOR_STATS[armor].toughness}
                    </div>

                    </div>


                    <div>

                    <label>Shield: </label>

                    <select
                        value={shield}
                        onChange={e=>setShield(e.target.value)}
                        >

                        <option>No Shield</option>
                        <option>Buckler</option>
                        <option>Round Shield</option>
                        <option>Tower Shield</option>

                    </select>

                    <div style={{marginTop:"8px"}}>
                    Physical Toughness: {shieldStats.toughness > 0 ? "+"+shieldStats.toughness : "0"}

                    <br/>

                    Brace Endurance Cost: {shieldStats.braceCost}

                    <br/>

                    Additional Properties:
                    {shieldStats.properties.length
                    ? " " + shieldStats.properties.join(", ")
                    : " None"}

                    </div>

                    </div>

                    </div>

                    <h3>Weapons</h3>
                    <select
                    value={weaponChoice}
                    onChange={e=>setWeaponChoice(e.target.value)}
                    >

                    <option value="">Select Weapon</option>

                    {weapons.map(w=>(
                    <option key={w.name} value={w.name}>
                    {w.name}
                    </option>
                    ))}

                    </select>

                    <button onClick={()=>addWeaponToInventory(weaponChoice)}> Add to Inventory </button>

                    <h4>Equipped Weapons</h4>

                    <div style={{marginTop:"10px"}}>
                        <div style={{
                        display:"grid",
                        gridTemplateColumns:"120px 120px 120px 120px 120px 120px 1fr 80px 80px",
                        fontWeight:"bold",
                        borderBottom:"2px solid #ccc",
                        paddingBottom:"4px"
                        }}>

                        <div>Name</div>
                        <div>Type</div>
                        <div>Attack Stat</div>
                        <div>Attack Bonus</div>
                        <div>Damage</div>
                        <div>Endurance</div>
                        <div>Properties</div>
                        <div>Swap</div>
                        <div>Remove</div>


                        </div>

                        {equippedWeapons.map((w,i)=>{

                        const attackBonus =
                        Math.max(...w.attackStats.map(stat=>statTotals[stat]))

                        return(

                        <div
                        key={i}
                        style={{
                        display:"grid",
                        gridTemplateColumns:"120px 120px 120px 120px 120px 120px 1fr 80px 80px",
                        padding:"4px 0",
                        borderBottom:"1px solid #ddd"
                        }}
                        >

                        <div>{w.name}</div>
                        <div>{w.type.join(", ")}</div>
                        <div>{w.attackStats.join(", ")}</div>
                        <div>+{attackBonus}</div>
                        <div>{w.damage.dice} {w.damage.type}</div>
                        <div>{w.enduranceCost}</div>
                        <div>{w.properties.join(", ")}</div>
                        <button onClick={()=>swapWeapon(i,"equipped")}>Unequip</button>
                        <div><button onClick={()=>removeWeapon(i,"equipped")}>Remove</button></div>
                        </div>

                        )

                        })}
                    </div>

                    <h4>Inventory</h4>
                    <div style={{
                    display:"grid",
                    gridTemplateColumns:"120px 120px 120px 120px 120px 120px 1fr 80px 80px",
                    fontWeight:"bold",
                    borderBottom:"2px solid #ccc",
                    paddingBottom:"4px"
                    }}>

                    <div>Name</div>
                    <div>Type</div>
                    <div>Attack Stat</div>
                    <div>Attack Bonus</div>
                    <div>Damage</div>
                    <div>Endurance</div>
                    <div>Properties</div>
                    <div>Swap</div>
                    <div>Remove</div>

                    </div>

                    {inventoryWeapons.map((w,i)=>{

                    const attackBonus =
                    Math.max(...w.attackStats.map(stat=>finalStats[stat]))

                    return(

                    <div
                    key={i}
                    style={{
                    display:"grid",
                    gridTemplateColumns:"120px 120px 120px 120px 120px 120px 1fr 80px 80px",
                    borderBottom:"1px solid #ddd"
                    }}
                    >

                    <div>{w.name}</div>
                    <div>{w.type.join(", ")}</div>
                    <div>{w.attackStats.join(", ")}</div>
                    <div>+{attackBonus}</div>
                    <div>{w.damage.dice} {w.damage.type}</div>
                    <div>{w.enduranceCost}</div>
                    <div>{w.properties.join(", ")}</div>
                    <div><button onClick={()=>swapWeapon(i,"inventory")}>Equip</button></div>
                    <div><button onClick={()=>removeWeapon(i,"inventory")}>Remove</button></div>
                    

                    </div>

                    )

                    })}
                </div>
                )}

                {activeTab === "settings" && (
                <div>

                <h3>Settings</h3>
                <div style={{display:"grid",gridTemplateColumns:"200px 100px",gap:"8px"}}>
                <h3>Stats</h3>
                <div></div>

                {STAT_LIST.map(stat=>(
                <React.Fragment key={stat}>
                <div>{stat}</div>
                <input
                type="number"
                value={settings.statOverrides[stat] ?? ""}
                placeholder="Override"
                onChange={e=>{
                const v = e.target.value
                setSettings(prev=>({
                ...prev,
                statOverrides:{
                ...prev.statOverrides,
                [stat]: v === "" ? null : Number(v)
                }
                }))
                }}
               />
                </React.Fragment>
                ))}

                <h3>General</h3>
                <div></div>

                <div>Available Skill Points</div>
                <input
                type="number"
                value={settings.skillPointsOverride ?? ""}
                placeholder="Override"
                onChange={e=>setSettings(prev=>({
                ...prev,
                skillPointsOverride: e.target.value === "" ? null : Number(e.target.value)
                }))}
                />

                <div>Evasion</div>
                <input
                type="number"
                value={settings.evasionOverride ?? ""}
                placeholder="Override"
                onChange={e=>setSettings(prev=>({
                ...prev,
                evasionOverride: e.target.value === "" ? null : Number(e.target.value)
                }))}
                />

                <div>Toughness</div>
                <input
                type="number"
                value={settings.toughnessOverride ?? ""}
                placeholder="Override"
                onChange={e=>setSettings(prev=>({
                ...prev,
                toughnessOverride: e.target.value === "" ? null : Number(e.target.value)
                }))}
                />

                <h3>Health</h3>
                <div></div>

                <div>Min</div>
                <input
                type="number"
                value={settings.healthMin}
                placeholder="0"
                onChange={e=>setSettings(prev=>({
                ...prev,
                healthMin:Number(e.target.value)
                }))}
                />

                <div>Max</div>
                <input
                type="number"
                placeholder="Override"
                value={settings.healthMax ?? ""}
                onChange={e=>setSettings(prev=>({
                ...prev,
                healthMax: e.target.value === "" ? null : Number(e.target.value)
                }))}
                />

                <h3>Endurance</h3>
                <div></div>

                <div>Min</div>
                <input
                type="number"
                placeholder="0"
                value={settings.enduranceMin}
                onChange={e=>setSettings(prev=>({
                ...prev,
                enduranceMin:Number(e.target.value)
                }))}
                />

                <div>Max</div>
                <input
                type="number"
                placeholder="Override"
                value={settings.enduranceMax ?? ""}
                onChange={e=>setSettings(prev=>({
                ...prev,
                enduranceMax: e.target.value === "" ? null : Number(e.target.value)
                }))}
                />

                <h3>Movement</h3>
                <div></div>

                <div>Speed</div>
                <input
                type="number"
                placeholder="3"
                value={settings.speedOverride ?? ""}
                onChange={e=>setSettings(prev=>({
                ...prev,
                speedOverride: e.target.value === "" ? null : Number(e.target.value)
                }))}
                />

                <div>Dash</div>
                <input
                type="number"
                placeholder="Override"
                value={settings.dashOverride ?? ""}
                onChange={e=>setSettings(prev=>({
                ...prev,
                dashOverride: e.target.value === "" ? null : Number(e.target.value)
                }))}
                />

                <h3>Luck</h3>
                <div></div>

                <div>Max Luck</div>
                <input
                type="number"
                placeholder="3"
                value={settings.luckMax}
                onChange={e=>setSettings(prev=>({
                ...prev,
                luckMax:e.target.value === "" ? null : Number(e.target.value)
                }))}
                />

                </div>

                </div>
                )}

                </div>

                </div>

                </div>
                )
                }

            function TopBar({
                name,
                setName,
                country,
                setCountry,
                currentLevel,
                setCurrentLevel,
                evasion,
                toughness,
                health,
                setHealth,
                minHealth,
                maxHealth,
                endurance,
                setEndurance,
                minEndurance,
                maxEndurance,
                speed,
                dashSpeed,
                luck,
                setLuck,
                settings
                }) {

                    const smallBox = {
                    width:"40px",
                    textAlign:"center"
                    }

                return (
                    <div className="topbar">
                        <div>
                            <div>
                            Name:
                            <input value={name} onChange={e=>setName(e.target.value)} />
                            </div>

                            <div>
                            Country of Origin:
                            <input value={country} onChange={e=>setCountry(e.target.value)} />
                            </div>
                        </div>

                        <div style={{display:"flex",gap:"20px",alignItems:"center"}}>
                            <div>
                            Evasion:
                            <input type="number" style={smallBox} value={evasion} readOnly />
                            </div>

                            <div>
                            Toughness:
                            <input type="number" style={smallBox} value={toughness} readOnly />
                            </div>

                            <div>
                            Health:
                            <input
                            type="number"
                            value={health}
                            style={smallBox}
                            onChange={e=>{
                            const v = e.target.value === "" ? null : Number(e.target.value)
                            setHealth(Math.max(minHealth, Math.min(v, maxHealth)))
                            }}
                            />
                            / {maxHealth}
                            </div>

                            <div>
                            Endurance:
                            <input
                            type="number"
                            value={endurance}
                            style={smallBox}
                            onChange={e=>{
                                const raw = e.target.value
                                if(raw === "") return

                                const v = Number(raw)
                                setEndurance(Math.max(minEndurance, Math.min(v, maxEndurance)))
                            }}
                            />
                            / {maxEndurance}
                            </div>

                            <div>
                            Speed:
                            <input type="number" style={smallBox} value={speed} readOnly />
                            <br/>
                            Dash:
                            <input type="number" style={smallBox} value={dashSpeed} readOnly />
                            </div>

                            <div>
                            Luck:
                            <input
                            type="number"
                            value={luck}
                            style={smallBox}
                            onChange={e=>{
                            const v = e.target.value === "" ? null : Number(e.target.value)
                            setLuck(Math.max(0, Math.min(v, settings.luckMax)))
                            }}
                            />
                            </div>

                            <div>
                            Level:

                            <select
                            value={currentLevel}
                            onChange={e=>setCurrentLevel(Number(e.target.value))}
                            >

                            {Array.from({length:20},(_,i)=>(
                            <option key={i+1} value={i+1}>
                            {i+1}
                            </option>
                            ))}

                            </select>

                            </div>

                        </div>
                    </div>
                )
            }

            const classGroups = [
                {
                    title:"Fighters",
                    classes:[
                    "Basher","Brute","Cleaver","Marksman",
                    "Martial Artist","Sharpshooter","Spearman","Swordsman"
                    ]
                },
                {
                    title:"Artisans",
                    classes:[
                    "Alchemist","Blacksmith","Carpenter","Chef",
                    "Farmer","Fisherman","Grenadier","Trapper"
                    ]
                },
                {
                    title:"Scholars",
                    classes:[
                    "Clergyman","Doctor","Ecologist","Musician",
                    "Navigator","Noble"
                    ]
                }
            ]

            const allClasses = classGroups.flatMap(g=>g.classes)
                function LeftPanel({
                    finalStats,
                    levelStats,
                    setLevelStats,
                    levels,
                    setLevels,
                    level1,
                    setLevel1,
                    classCounts
                    }) {
                        function updateLevel(index,value){
                            const copy=[...levels]
                            copy[index]=value
                            setLevels(copy)
                        }

                        function updateLevel1(index,value){
                            const copy=[...level1]
                            copy[index]=value
                            setLevel1(copy)
                        }

                        return(
                            <div className="leftpanel">

                            {/* Level 1 */}

                            <div>
                                <h3>Level 1</h3>

                                {[0,1,2].map(i=>(
                                <select
                                    key={i}
                                    value={level1[i]}
                                    onChange={e=>updateLevel1(i,e.target.value)}
                                >

                                    <option value="">Select Class</option>

                                    {classGroups.map(group => (
                                    <optgroup key={group.title} label={group.title}>
                                        {group.classes
                                        .filter(c => !level1.includes(c) || level1[i] === c)
                                        .map(c => (
                                            <option
                                                key={c}
                                                disabled={
                                                (classCounts[c] || 0) >= 5 && level1[i] !== c
                                                }
                                                >
                                                {c}
                                                </option>
                                        ))
                                        }
                                    </optgroup>
                                    ))}

                                </select>

                                
                                ))}

                                <div className="statButtons">
                                    {STAT_LIST.map(stat=>(
                                    <div key={stat}>

                                    <button onClick={()=>
                                    removeStat(
                                    1,
                                    stat,
                                    levelStats,
                                    setLevelStats
                                    )
                                    }>-</button>

                                    <span>
                                    {stat} ({levelStats[0][stat]})
                                    </span>

                                    <button onClick={()=>
                                    addStat(
                                    1,
                                    stat,
                                    levelStats,
                                    setLevelStats
                                    )
                                    }>+</button>

                                    </div>
                                    ))}
                                    </div>

                            </div>             

                            {/* Levels 2–20 */}

                            {Array.from({length:19},(_,i)=>{

                                const level=i+2

                                return(
                                <div key={level}>
                                    <h3>Level {level}</h3>

                                    <select
                                    value={levels[level-1]||""}
                                    onChange={e=>updateLevel(level-1,e.target.value)}
                                    >

                                    <option value="">Select Class</option>

                                    {classGroups.map(group=>(
                                        <optgroup key={group.title} label={group.title}>
                                        {group.classes.map(c=>(
                                            <option
                                                key={c}
                                                disabled={
                                                (classCounts[c] || 0) >= 5 && levels[level-1] !== c
                                                }
                                                >
                                                {c}
                                            </option>
                                        ))}
                                        </optgroup>
                                    ))}

                                    </select>
                                    <div className="statButtons">

                                    {STAT_LIST.map(stat=>(
                                    <div key={stat}>

                                    <button onClick={()=>
                                        removeStat(
                                            level,
                                            stat,
                                            levelStats,
                                            setLevelStats
                                            )
                                        }>-</button>

                                    <span>
                                    {stat} ({levelStats[level-1][stat]})
                                    </span>

                                    <button onClick={()=>
                                        addStat(
                                            level,
                                            stat,
                                            levelStats,
                                            setLevelStats
                                            )
                                        }>+</button>

                                    </div>
                                    ))}
                                </div>
                                </div>
                                )
                            })}
                            </div>
                        )
                }

            function addStat(level,stat,levelStats,setLevelStats){

                const levelIndex = level-1

                const spent = Object.values(levelStats[levelIndex]).reduce((a,b)=>a+b,0)
                const levelLimit = LEVEL_POINTS(level)

                if(spent >= levelLimit) return

                const statTotal = levelStats.reduce((sum,lvl)=>sum + lvl[stat],0)

                if(statTotal >= 10) return
                if(level === 1 && levelStats[levelIndex][stat] >= 5) return

                const newLevelStats=[...levelStats]
                newLevelStats[levelIndex][stat]++

                setLevelStats(newLevelStats)
            }

            function removeStat(level,stat,levelStats,setLevelStats){

                const levelIndex = level-1
                if(levelStats[levelIndex][stat] <= 0) return

                const newLevelStats=[...levelStats]
                newLevelStats[levelIndex][stat]--

                setLevelStats(newLevelStats)
            }

            function addSkill(level,skill,levelSkills,setLevelSkills,availableSkillPoints){
                const idx = level - 1

                if(availableSkillPoints <= 0) return

                const skillTotal =
                levelSkills.reduce((sum,lvl)=>sum + lvl[skill],0)

                if(skillTotal >= 10) return   // max +10 skill bonus

                const newSkills = [...levelSkills]
                newSkills[idx][skill]++

                setLevelSkills(newSkills)
                }

            function removeSkill(level,skill,levelSkills,setLevelSkills){

                const idx=level-1
                if(levelSkills[idx][skill]===0) return

                const newSkills=[...levelSkills]
                newSkills[idx][skill]--

                setLevelSkills(newSkills)
            }

            

            function App(){
                const [name,setName] = React.useState("")
                const [country,setCountry] = React.useState("")
                const [currentLevel,setCurrentLevel] = React.useState(1)

                const [levels,setLevels] = React.useState(Array(20).fill(null))
                const [level1,setLevel1] = React.useState(["","",""])

                const [levelStats,setLevelStats] = React.useState(
                Array.from({length:20},()=>({
                Brawn:0,
                Finesse:0,
                Grit:0,
                Awareness:0,
                Brains:0,
                Swagger:0
                }))
                )

                const activeStats = levelStats.slice(0,currentLevel)
                    
                const statTotals = {
                    Brawn:0,
                    Finesse:0,
                    Grit:0,
                    Awareness:0,
                    Brains:0,
                    Swagger:0
                }

                activeStats.forEach(level=>{
                STAT_LIST.forEach(stat=>{
                statTotals[stat]+=level[stat]
                })
                })

                const [levelSkills,setLevelSkills] = React.useState(
                    Array.from({length:20},()=>({
                    Rigging:0,
                    Lifting:0,
                    Pinning:0,
                    Swimming:0,
                    Acrobatics:0,
                    Skulduggery:0,
                    Sneaking:0,
                    Nausea:0,
                    Resilience:0,
                    Tolerance:0,
                    Fishing:0,
                    Investigation:0,
                    Intuition:0,
                    Tracking:0,
                    History:0,
                    Learning:0,
                    Tinkering:0,
                    Infamy:0,
                    Influence:0,
                    Negotiation:0
                    }))
                )

                const [settings,setSettings] = React.useState({
                    statOverrides:{},
                    skillPointsOverride:null,
                    evasionOverride:null,
                    toughnessOverride:null,
                    healthMin:0,
                    healthMax:null,
                    enduranceMin:0,
                    enduranceMax:null,
                    speedOverride:null,
                    dashOverride:null,
                    luckMax:3
                })

                const finalStats = {...statTotals}

                Object.entries(settings.statOverrides || {}).forEach(([stat,val])=>{
                    if(val !== null && !Number.isNaN(val)){
                        finalStats[stat] = val
                    }
                })

                const baseMaxHealth = 15 + finalStats.Grit

                const maxHealth =
                settings.healthMax ?? baseMaxHealth

                const minHealth =
                settings.healthMin ?? 0

                const [health,setHealth] = React.useState(0)

                React.useEffect(()=>{
                setHealth(maxHealth)
                },[maxHealth])

                const baseEndurance =
                Math.floor((finalStats.Brawn + finalStats.Finesse + finalStats.Grit)/2) * currentLevel

                const maxEndurance =
                settings.enduranceMax ?? Math.max(10, baseEndurance)

                const minEndurance =
                settings.enduranceMin ?? 0

                const [endurance,setEndurance] = React.useState(0)

                React.useEffect(()=>{
                    setEndurance(prev =>
                        Math.max(minEndurance, Math.min(prev, maxEndurance))
                    )
                },[maxEndurance, minEndurance])

                const speed =
                settings.speedOverride ?? 3

                const dashSpeed =
                settings.dashOverride ?? (3 + finalStats.Finesse)

                const [luck,setLuck] = React.useState(3)

                let totalSkillPoints = 10 + (currentLevel - 1) * 2

                const spentSkillPoints =
                levelSkills
                .slice(0,currentLevel)
                .reduce((sum,level)=>{
                return sum + Object.values(level).reduce((a,b)=>a+b,0)
                },0)

                const availableSkillPoints = settings.skillPointsOverride ?? (totalSkillPoints - spentSkillPoints)

                const activeSkills = levelSkills.slice(0,currentLevel)

                const skillTotals = {}
                    Object.values(SKILL_LIST).flat().forEach(skill=>{
                    skillTotals[skill] = 0
                })

                activeSkills.forEach(level=>{
                    Object.keys(level).forEach(skill=>{
                    skillTotals[skill] += level[skill]
                    })
                })

                Object.keys(skillTotals).forEach(skill=>{
                    const stat = SKILL_TO_STAT[skill]
                    skillTotals[skill] += finalStats[stat]
                })

                const selectedClasses = [
                    ...level1,
                    ...levels.slice(0,currentLevel)
                    ].filter(Boolean)

                    const classCounts = {}

                    selectedClasses.forEach(cls=>{
                    classCounts[cls] = (classCounts[cls] || 0) + 1
                })

                const [armor,setArmor] = React.useState("No Armor")
                const [shield,setShield] = React.useState("No Shield")

                const armorStats = ARMOR_STATS[armor]
                const shieldStats = SHIELD_STATS[shield]

                const evasion =
                settings.evasionOverride ??
                (armorStats.baseEvasion + Math.floor(finalStats.Finesse/2))

                const toughness =
                settings.toughnessOverride ??
                (armorStats.toughness + shieldStats.toughness)

                const [weapons,setWeapons] = React.useState([])

                const [equippedWeapons,setEquippedWeapons] = React.useState([])
                const [weaponChoice,setWeaponChoice] = React.useState("")

                const [inventoryWeapons,setInventoryWeapons] = React.useState([]) 

                React.useEffect(()=>{
                fetch("weapons.JSON")
                .then(res=>res.json())
                .then(data=>setWeapons(data))
                },[])

                function addWeaponToInventory(name){

                    const weapon = weapons.find(w=>w.name === name)
                    if(!weapon) return

                    setInventoryWeapons([...inventoryWeapons,weapon])

                }

                function swapWeapon(index,from){
                    if(from === "inventory"){

                    const weapon = inventoryWeapons[index]

                    setInventoryWeapons(inventoryWeapons.filter((_,i)=>i!==index))
                    setEquippedWeapons([...equippedWeapons,weapon])

                    }

                    else{

                    const weapon = equippedWeapons[index]

                    setEquippedWeapons(equippedWeapons.filter((_,i)=>i!==index))
                    setInventoryWeapons([...inventoryWeapons,weapon])

                    }

                }

                function removeWeapon(index, from){
                    if(from === "equipped"){

                    setEquippedWeapons(
                    equippedWeapons.filter((_,i)=>i !== index)
                    )

                    }

                    if(from === "inventory"){

                    setInventoryWeapons(
                    inventoryWeapons.filter((_,i)=>i !== index)
                    )

                    }

                }

                return(
                    <div className="app">

                    <TopBar
                        name={name}
                        setName={setName}
                        country={country}
                        setCountry={setCountry}
                        currentLevel={currentLevel}
                        setCurrentLevel={setCurrentLevel}
                        evasion={evasion}
                        endurance={endurance}
                        setEndurance={setEndurance}
                        minEndurance={minEndurance}
                        maxEndurance={maxEndurance}
                        toughness={toughness}
                        health={health}
                        setHealth={setHealth}
                        minHealth={minHealth}
                        maxHealth={maxHealth}
                        speed={speed}
                        dashSpeed={dashSpeed}
                        luck={luck}
                        setLuck={setLuck}
                        settings={settings}
                    />

                    <LeftPanel
                        finalStats={finalStats}
                        levelStats={levelStats}
                        setLevelStats={setLevelStats}
                        levels={levels}
                        setLevels={setLevels}
                        level1={level1}
                        setLevel1={setLevel1}
                        classCounts={classCounts}
                    />

                    <MainPage
                        finalStats={finalStats}
                        classCounts={classCounts}
                        skillTotals={skillTotals}
                        currentLevel={currentLevel}
                        levelSkills={levelSkills}
                        setLevelSkills={setLevelSkills}
                        availableSkillPoints={availableSkillPoints}
                        armor={armor}
                        setArmor={setArmor}
                        shield={shield}
                        setShield={setShield}
                        shieldStats={shieldStats}
                        weapons={weapons}
                        equippedWeapons={equippedWeapons}
                        removeWeapon={removeWeapon}
                        inventoryWeapons={inventoryWeapons}
                        swapWeapon={swapWeapon}
                        weaponChoice={weaponChoice}
                        setWeaponChoice={setWeaponChoice}
                        addWeaponToInventory={addWeaponToInventory}
                        settings={settings}
                        setSettings={setSettings}
                    />

                    </div>
                )
            }
            
            ReactDOM.createRoot(document.getElementById("root")).render(<App />);
        </script>
    </body>

</html>
