<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        

    </head>

    <body>

        <div id="root"></div>

        <style>
            :root {
                --bg-main: #1e1e1e;
                --bg-panel: #2a2a2a;
                --bg-card: #333;
                --bg-highlight: #3f3f3f;

                --text-main: #ffffff;
                --text-muted: #bbbbbb;

                --accent: #4e4e4e;

                --font-main: "Segoe UI", sans-serif;
                --font-header: "Georgia", serif;

                --font-size-base: 14px;
                --font-size-large: 18px;
                --font-size-header: 22px;
            }

            body {
                margin: 0;
                background: var(--bg-main);
                color: var(--text-main);
                font-family: var(--font-main);
                font-size: var(--font-size-base);
            }

            .panel {
                background: var(--bg-panel);
                border-radius: 8px;
                padding: 10px;
            }

            .card {
                background: var(--bg-card);
                border-radius: 6px;
                padding: 8px;
            }

            .highlight {
                background: var(--bg-highlight);
            }

            .app {
                display: grid;
                grid-template-rows: 90px 1fr;
                grid-template-columns: var(--left-width, 320px) 1fr;
                transition: grid-template-columns 0.2s ease;
                height: 100vh;
            }

            .topbar {
                grid-column: 1 / span 2;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 20px;
                border-bottom: 2px solid #ccc;
                background: var(--bg-panel);
                font-size: var(--font-size-large);
            }

            .leftpanel {
                padding: 10px;
                overflow-y: auto;
                border-right: 2px solid #ccc;
                transition: width 0.2s ease;
                
            }

            .leftpanel.closed {
                width: 40px;
                overflow: hidden;
            }

            .mainpage {
                padding: 20px;
                padding-bottom: 80px;
            }

            .statRow{
                display:flex;
                gap:30px;
            }

            .statBlock{
                min-width:120px;
                background: var(--bg-card);
                padding: 8px;
                border-radius: 6px;
                margin-bottom: 12px;
            }

            .statBlock ul {
                list-style: none;
                padding-left: 0;
                margin: 0;
                
            }

            li {
                background: var(--bg-panel);
                margin-top: 12px;
                margin-bottom: 12px;
                padding: 6px;
                border-radius: 4px;
                
            }

            button {
                background: var(--accent);
                border: none;
                padding: 4px 8px;
                border-radius: 4px;
                cursor: pointer;
                color: white;
            }

            .skills {
                display: flex;
                flex-direction: column;
                gap: 5px;
                
            }

            button:hover {
                opacity: 0.85;
            }
            
            .statBlock h3 {
                font-size: 24px;
                margin: 0 0 4px 0;
            }

            .statBlock input {
                width: 150px;
                font-size: 14px;
            }

            input, select {
                background: #222;
                color: white;
                border: 1px solid #555;
                border-radius: 4px;
                padding: 2px 4px;
            }
            .background-section {
                margin-bottom: 20px;
            }

            .background-section h4 {
                margin-bottom: 10px;
            }

            .background-field {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 12px;
            }

            .background-field input {
                padding: 4px 6px;
                width: 100%;
            }

            .background-field textarea {
                width: 100%;
                min-height: 80px;
                background: #1a1a1a;
                color: white;
                border: 1px solid #555;
                border-radius: 4px;
                padding: 6px;
                resize: none;
            }         
        </style>

        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


        <script type="text/babel">
            // Map each stat and skill together
            const stats = {
                Brawn:["Rigging","Lifting","Pinning","Swimming"],
                Finesse:["Acrobatics","Skulduggery","Sneaking"],
                Grit:["Nausea","Resilience","Tolerance"],
                Awareness:["Fishing","Investigation","Intuition","Tracking"],
                Brains:["History","Learning","Tinkering"],
                Swagger:["Infamy","Influence","Negotiation"]
            }

            // Allows for reverse lookup: skill -> stat
            const SKILL_TO_STAT = {}
                Object.entries(stats).forEach(([stat,skills])=>{
                skills.forEach(skill=>{
                SKILL_TO_STAT[skill] = stat
                })
            })

            const STAT_LIST = Object.keys(stats)

            // All types of weapons
            const WEAPON_TYPES = [
                "Strike",
                "Blunt",
                "Sword",
                "Axe",
                "Polearm",
                "Hand Firearm",
                "Sniper Firearm",
                "Grenade"
            ]

            // Classes that give a bonus of rank to each weapon type
            const CLASS_WEAPON_BONUS = {
                Basher: ["Blunt"],
                Cleaver: ["Axe"],
                Marksman: ["Hand Firearm"],
                "Martial Artist": ["Strike"],
                Sharpshooter: ["Sniper Firearm"],
                Spearman: ["Polearm"],
                Swordsman: ["Sword"]
            }

            // Stat level up system. Players gain 10 points at level 1 and 1 point for each level after
            // Max at level 1 is 5, max at all other levels is 10
            const LEVEL_POINTS = level => level === 1 ? 10 : 1
            const LEVEL_STAT_CAP = level => level === 1 ? 5 : 10
            
            // Skill level up system. Players gain 10 points at level 1 and 2 points for each level after
            const LEVEL_SKILL_POINTS = level => level === 1 ? 10 : 2

            // Armor Statistics
            const ARMOR_STATS = {
                "No Armor": { 
                    baseEvasion:16, 
                    toughness:0 
                },
                "Leather Armor": { 
                    baseEvasion:14, 
                    toughness:2 
                },
                "Chain Mail": { 
                    baseEvasion:12, 
                    toughness:3 
                },
                "Plate Armor": { 
                    baseEvasion:10, 
                    toughness:4 
                }
            }

            // Shield Statistics
            const SHIELD_STATS = {
                "No Shield":{
                toughness:0,
                braceCost:0,
                properties:[]
                },
                "Buckler":{
                toughness:1,
                braceCost:2,
                properties:["Attachable","Parry"]
                },
                "Round Shield":{
                toughness:2,
                braceCost:3,
                properties:[]
                },
                "Tower Shield":{
                toughness:4,
                braceCost:4,
                properties:[]
                }
            }

            function MainPage({
                finalStats,
                classCounts,
                skillTotals,
                currentLevel,
                levelSkills,
                setLevelSkills,
                availableSkillPoints,
                armor,
                setArmor,
                shield,
                setShield,
                useShield,
                setUseShield,
                shieldStats,
                weapons,
                equippedWeapons,
                removeWeapon,
                inventoryWeapons,
                swapWeapon,
                weaponChoice,
                setWeaponChoice,
                addWeaponToInventory,
                items,
                addItem,
                updateItem,
                removeItem,
                weaponTypeBonuses,
                settings,
                setSettings,
                sortBy,
                setSortBy,
                sortedActionAbilities,
                passiveAbilities,
                background,
                setBackground
                }) {

                const [activeTab,setActiveTab] = React.useState("class")

                return (
                <div className="mainpage">

                <div className="statRow">
                {Object.entries(stats).map(([stat,skills])=>(
                <div className="statBlock" key={stat}>

                <h3>{stat}</h3>

                <input
                type="number"
                value={Number.isFinite(finalStats[stat]) ? finalStats[stat] : 0}
                readOnly
                />
                <ul>
                    {skills.map(skill=>(
                    <li key={skill}>

                    <div className="skills">
                        {skill}

                        <div>
                            <input
                            type="number"
                            value={Number.isFinite(skillTotals[skill]) ? skillTotals[skill] : 0}
                            readOnly
                            />
                        </div>

                        <div>

                            <button onClick={()=>removeSkill(currentLevel,skill,levelSkills,setLevelSkills)}>-</button>

                            <span>
                            {levelSkills
                                .slice(0,currentLevel)
                                .reduce((sum,lvl)=>sum + lvl[skill],0)}
                            </span>

                            <button onClick={()=>addSkill(currentLevel,skill,levelSkills,setLevelSkills,availableSkillPoints)}>+</button>

                        </div>
                    </div>

                    </li>
                    ))}
                </ul>

                </div>
                ))}
                </div>
                <div style={{marginBottom:"15px", color: availableSkillPoints === 0 ? "grey" : "white"}} >
                    <strong>Available Skill Points:</strong> {availableSkillPoints}
                </div>

                <div style={{marginTop:"30px"}}>

                <div style={{display:"flex",gap:"10px",marginBottom:"10px"}}>

                <button onClick={()=>setActiveTab("class")}>Class</button>
                <button onClick={()=>setActiveTab("combat")}>Combat</button>
                <button onClick={()=>setActiveTab("inventory")}>Inventory</button>
                <button onClick={()=>setActiveTab("background")}>Background</button>
                <button onClick={()=>setActiveTab("settings")}>Settings</button>

                </div>

                <div>

                {activeTab === "class" && (
                <div>

                <h3>Class Ranks</h3>

                <ul>
                {Object.entries(classCounts).map(([cls,count])=>(
                <li key={cls}>
                {cls} - {count}
                </li>
                ))}
                </ul>

                <div>

                <h3>Class Abilities</h3>

                <div style={{marginBottom:"10px"}}>
                Sort:{" "}
                <select value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                <option value="rank">By Rank</option>
                <option value="cost">By Action Cost</option>
                </select>
                </div>

                <h4>Action Abilities</h4>

                {sortedActionAbilities.map((a,i)=>(
                <div key={i} style={{borderBottom:"1px solid #ccc",marginBottom:"6px"}}>
                <strong>{a.name}</strong> (Rank {a.rank})<br/>
                Class: {a.class}<br/>
                Action Cost: {a.actionCost} | Endurance: {a.enduranceCost}<br/>
                {a.description}
                </div>
                ))}

                <h4>Free / Passive Abilities</h4>

                {passiveAbilities.map((a,i)=>(
                <div key={i} style={{borderBottom:"1px solid #ccc",marginBottom:"6px"}}>
                <strong>{a.name}</strong> (Rank {a.rank})<br/>
                Class: {a.class}<br/>
                {a.description}
                </div>
                ))}

                </div>

                </div>
                
                )}
                
                {activeTab === "combat" && (
                    <div>

                    <h3>Combat</h3>

                   <div style={{display:"flex",gap:"40px"}}>

                    <div>

                    <label>Armor: </label>

                    <select
                    value={armor}
                    onChange={e=>setArmor(e.target.value)}
                    >

                    <option>No Armor</option>
                    <option>Leather Armor</option>
                    <option>Chain Mail</option>
                    <option>Plate Armor</option>

                    </select>

                    <div style={{marginTop:"8px"}}>
                    Base Evasion: {ARMOR_STATS[armor].baseEvasion} + ½ Finesse
                    <br/>
                    Toughness Bonus: +{ARMOR_STATS[armor].toughness}
                    </div>

                    </div>


                    <div>

                    <label>Shield: </label>

                    <select
                        value={shield}
                        onChange={e=>setShield(e.target.value)}
                        >

                        <option>No Shield</option>
                        <option>Buckler</option>
                        <option>Round Shield</option>
                        <option>Tower Shield</option>

                    </select>

                    <div style={{marginTop:"8px"}}>
                    Physical Toughness: {shieldStats.toughness > 0 ? "+"+shieldStats.toughness : "0"}

                    <br/>

                    Brace Endurance Cost: {shieldStats.braceCost}

                    <br/>

                    Additional Properties:
                    {shieldStats.properties.length
                    ? " " + shieldStats.properties.join(", ")
                    : " None"}
                    
                    </div>

                    <label>
                        <input
                            type="checkbox"
                            checked={useShield}
                            onChange={e=>setUseShield(e.target.checked)}
                        />
                        Use Shield
                    </label>

                    </div>

                    </div>

                    <h3>Weapons</h3>
                    <select
                    value={weaponChoice}
                    onChange={e=>setWeaponChoice(e.target.value)}
                    >

                    <option value="">Select Weapon</option>

                    {weapons.map(w=>(
                    <option key={w.name} value={w.name}>
                    {w.name}
                    </option>
                    ))}

                    </select>

                    <button onClick={()=>addWeaponToInventory(weaponChoice)}> Add to Inventory </button>

                    <h4>Equipped Weapons</h4>

                    <div style={{marginTop:"10px"}}>
                        <div style={{
                        display:"grid",
                        gridTemplateColumns:"120px 120px 120px 120px 150px 120px 1fr 80px 80px",
                        fontWeight:"bold",
                        borderBottom:"2px solid #ccc",
                        paddingBottom:"4px"
                        }}>

                        <div>Name</div>
                        <div>Type</div>
                        <div>Attack Stat</div>
                        <div>Attack Bonus</div>
                        <div>Damage</div>
                        <div>Endurance</div>
                        <div>Properties</div>
                        <div>Swap</div>
                        <div>Remove</div>


                        </div>

                        {equippedWeapons.map((w,i)=>{

                        const statBonus =
                        Math.max(...w.attackStats.map(stat => finalStats[stat]))

                        const classBonus =
                        Math.max(
                            0,
                            ...w.type.map(type => {

                                const classVal = weaponTypeBonuses[type] || 0
                                const overrideVal = settings.weaponTypeOverrides?.[type]

                                return overrideVal !== null && overrideVal !== undefined
                                    ? overrideVal
                                    : classVal
                            })
                        )

                        const attackBonus = statBonus + classBonus

                        return(

                        <div
                        key={i}
                        style={{
                        display:"grid",
                        gridTemplateColumns:"120px 120px 120px 120px 150px 120px 1fr 80px 80px",
                        padding:"4px 0",
                        borderBottom:"1px solid #ddd"
                        }}
                        >

                        <div>{w.name}</div>
                        <div>{w.type.join(", ")}</div>
                        <div>{w.attackStats.join(", ")}</div>
                        <div>+{attackBonus}</div>
                        <div>{w.damage.dice} {w.damage.type}</div>
                        <div>{w.enduranceCost}</div>
                        <div>{w.properties.join(", ")}</div>
                        <button onClick={()=>swapWeapon(i,"equipped")}>Unequip</button>
                        <div><button onClick={()=>removeWeapon(i,"equipped")}>Remove</button></div>
                        </div>

                        )

                        })}
                    </div>

                    <h4>Inventory</h4>
                    <div style={{
                    display:"grid",
                    gridTemplateColumns:"120px 120px 120px 120px 150px 120px 1fr 80px 80px",
                    fontWeight:"bold",
                    borderBottom:"2px solid #ccc",
                    paddingBottom:"4px"
                    }}>

                    <div>Name</div>
                    <div>Type</div>
                    <div>Attack Stat</div>
                    <div>Attack Bonus</div>
                    <div>Damage</div>
                    <div>Endurance</div>
                    <div>Properties</div>
                    <div>Swap</div>
                    <div>Remove</div>

                    </div>

                    {inventoryWeapons.map((w,i)=>{

                    const statBonus =
                    Math.max(...w.attackStats.map(stat => finalStats[stat]))

                    const classBonus =
                    Math.max(
                        0,
                        ...w.type.map(type => {

                            const classVal = weaponTypeBonuses[type] || 0
                            const overrideVal = settings.weaponTypeOverrides?.[type]

                            return overrideVal !== null && overrideVal !== undefined
                                ? overrideVal
                                : classVal
                        })
                    )

                    const attackBonus = statBonus + classBonus

                    Math.max(...w.attackStats.map(stat=>finalStats[stat]))

                    return(

                    <div
                    key={i}
                    style={{
                    display:"grid",
                    gridTemplateColumns:"120px 120px 120px 120px 150px 120px 1fr 80px 80px",
                    borderBottom:"1px solid #ddd"
                    }}
                    >

                    <div>{w.name}</div>
                    <div>{w.type.join(", ")}</div>
                    <div>{w.attackStats.join(", ")}</div>
                    <div>+{attackBonus}</div>
                    <div>{w.damage.dice} {w.damage.type}</div>
                    <div>{w.enduranceCost}</div>
                    <div>{w.properties.join(", ")}</div>
                    <div><button onClick={()=>swapWeapon(i,"inventory")}>Equip</button></div>
                    <div><button onClick={()=>removeWeapon(i,"inventory")}>Remove</button></div>
                    

                    </div>

                    )

                    })}
                </div>
                )}

                {activeTab === "inventory" && (
                <div>

                <h3>Inventory</h3>

                <button onClick={addItem}>Add Item</button>

                <div style={{marginTop:"10px"}}>

                <div style={{
                    display:"grid",
                    gridTemplateColumns:"200px 100px 100px 80px",
                    fontWeight:"bold",
                    borderBottom:"2px solid #ccc",
                    paddingBottom:"4px"
                }}>
                    <div>Name</div>
                    <div>Charges</div>
                    <div>Amount</div>
                    <div>Remove</div>
                </div>

                {items.map(item => (
                <div
                key={item.id}
                style={{
                    display:"grid",
                    gridTemplateColumns:"200px 100px 100px 80px",
                    padding:"4px 0",
                    borderBottom:"1px solid #ddd"
                }}
                >

                <input
                value={item.name}
                onChange={e=>updateItem(item.id,"name",e.target.value)}
                />

                <input
                type="number"
                value={item.charges}
                onChange={e=>updateItem(item.id,"charges",Number(e.target.value))}
                style={{width:"60px"}}
                />

                <input
                type="number"
                value={item.amount}
                onChange={e=>updateItem(item.id,"amount",Number(e.target.value))}
                style={{width:"60px"}}
                />

                <button onClick={()=>removeItem(item.id)}>Remove</button>

                </div>
                ))}

                </div>

                </div>
                )}

                {activeTab === "background" && (
                <div className = "Background">

                <h3>Character Profile</h3>

                <div style={{display:"flex",flexDirection:"column",gap:"16px",maxWidth:"600px"}}>

                {/* Identity */}
                <div className="background-section">
                <h4>Identity</h4>
                <div className="background-field">
                    Age: 
                    <input placeholder="Age"
                    value={background.age}
                    onChange={e=>setBackground(p=>({...p, age:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Gender: 
                    <input placeholder="Gender"
                    value={background.gender}
                    onChange={e=>setBackground(p=>({...p, gender:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Race: 
                    <input placeholder="Race"
                    value={background.race}
                    onChange={e=>setBackground(p=>({...p, race:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Country: 
                    <input placeholder="Country"
                    value={background.country}
                    onChange={e=>setBackground(p=>({...p, country:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Religion: 
                    <input placeholder="Religion"
                    value={background.religion}
                    onChange={e=>setBackground(p=>({...p, religion:e.target.value}))}
                    />
                </div>

                </div>

                {/* Physical */}
                <div className="background-section">
                <h4>Physical</h4>

                <div className="background-field">
                    Height: 
                    <input placeholder="Height"
                    value={background.height}
                    onChange={e=>setBackground(p=>({...p, height:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Weight: 
                    <input placeholder="Weight"
                    value={background.weight}
                    onChange={e=>setBackground(p=>({...p, weight:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Eye Color: 
                    <input placeholder="Eye Color"
                    value={background.eyeColor}
                    onChange={e=>setBackground(p=>({...p, eyeColor:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Hair Color: 
                    <input placeholder="Hair Color"
                    value={background.hairColor}
                    onChange={e=>setBackground(p=>({...p, hairColor:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    <div>
                        Distringuishing Features: 
                    </div>
                    <div>
                        <textarea placeholder="Distinguishing Features"
                        value={background.features}
                        onChange={e=>setBackground(p=>({...p, features:e.target.value}))}
                        />
                    </div>
                </div>

                </div>

                {/* Social */}
                <div className="background-section">
                <h4>Background</h4>

                <div className="background-field">
                    Former Crews: 
                    <input placeholder="Former Crews"
                    value={background.formerCrews}
                    onChange={e=>setBackground(p=>({...p, formerCrews:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Occupation: 
                    <input placeholder="Occupation"
                    value={background.occupation}
                    onChange={e=>setBackground(p=>({...p, occupation:e.target.value}))}
                    />
                </div>

                <div className="background-field">
                    Reputation: 
                    <input placeholder="Reputation"
                    value={background.reputation}
                    onChange={e=>setBackground(p=>({...p, reputation:e.target.value}))}
                    />
                </div>

                </div>

                {/* Narrative */}
                <div className="background-section">
                <h4>Narrative</h4>

                <div className="background-field">
                    <div>
                        Appearance Description:
                    </div>

                    <div>
                    <textarea placeholder="Appearance Description"
                    value={background.appearance}
                    onChange={e=>setBackground(p=>({...p, appearance:e.target.value}))}
                    />
                    </div>
                </div>

                <div className="background-field">
                    <div>
                        Personality:
                    </div>
                    
                    <div>
                    <textarea placeholder="Personality"
                    value={background.personality}
                    onChange={e=>setBackground(p=>({...p, personality:e.target.value}))}
                    />
                    </div>
                </div>

                <div className="background-field">
                    <div>
                        Backstory:
                    </div>
                    
                    <div>
                    <textarea placeholder="Backstory"
                    value={background.backstory}
                    onChange={e=>setBackground(p=>({...p, backstory:e.target.value}))}
                    />
                    </div>
                </div>

                <div className="background-field">
                    <div>
                        Goals:
                    </div>
                    
                    <div>
                    <textarea placeholder="Goals"
                    value={background.goals}
                    onChange={e=>setBackground(p=>({...p, goals:e.target.value}))}
                    />
                    </div>
                </div>

                <div className="background-field">
                    <div>
                        Notes: 
                    </div>
                    
                    <div>
                    <textarea placeholder="Notes"
                    value={background.notes}
                    onChange={e=>setBackground(p=>({...p, notes:e.target.value}))}
                    />
                    </div>
                </div>

                </div>

                </div>

                </div>
                )}

                {activeTab === "settings" && (
                <div>

                <h3>Settings</h3>
                <div style={{display:"grid",gridTemplateColumns:"200px 100px",gap:"8px"}}>
                <h3>Stats</h3>
                <div></div>

                {STAT_LIST.map(stat=>(
                <React.Fragment key={stat}>
                <div>{stat}</div>
                <input
                type="number"
                value={settings.statOverrides[stat] ?? ""}
                placeholder="Override"
                onChange={e=>{
                const v = e.target.value
                setSettings(prev=>({
                ...prev,
                statOverrides:{
                ...prev.statOverrides,
                [stat]: v === "" ? null : Number(v)
                }
                }))
                }}
               />
                </React.Fragment>
                ))}

                <h3>General</h3>
                <div></div>

                <div>Available Skill Points</div>

            function addStat(level,stat,levelStats,setLevelStats){

                const levelIndex = level-1

                const spent = Object.values(levelStats[levelIndex]).reduce((a,b)=>a+b,0)
                const levelLimit = LEVEL_POINTS(level)

                if(spent >= levelLimit) return

                const statTotal = levelStats.reduce((sum,lvl)=>sum + lvl[stat],0)

                if(statTotal >= 10) return
                if(level === 1 && levelStats[levelIndex][stat] >= 5) return

                const newLevelStats=[...levelStats]
                newLevelStats[levelIndex][stat]++

                setLevelStats(newLevelStats)
            }

            function removeStat(level,stat,levelStats,setLevelStats){

                const levelIndex = level-1
                if(levelStats[levelIndex][stat] <= 0) return

                const newLevelStats=[...levelStats]
                newLevelStats[levelIndex][stat]--

                setLevelStats(newLevelStats)
            }

            function addSkill(level,skill,levelSkills,setLevelSkills,availableSkillPoints){
                const idx = level - 1

                if(availableSkillPoints <= 0) return

                const skillTotal =
                levelSkills.reduce((sum,lvl)=>sum + lvl[skill],0)

                if(skillTotal >= 10) return

                const newSkills = [...levelSkills]
                newSkills[idx][skill]++

                setLevelSkills(newSkills)
                }

            function removeSkill(level,skill,levelSkills,setLevelSkills){

                const idx=level-1
                if(levelSkills[idx][skill]===0) return

                const newSkills=[...levelSkills]
                newSkills[idx][skill]--

                setLevelSkills(newSkills)
            }

                                setLevelSkills(raw.levelSkills ?? levelSkills)
                                setSettings(raw.settings ?? settings)
                                setArmor(raw.armor ?? "No Armor")
                                setShield(raw.shield ?? "No Shield")
                                setEquippedWeapons(raw.equippedWeapons ?? [])
                                setInventoryWeapons(raw.inventoryWeapons ?? [])
                                setHealth(raw.health ?? 0)
                                setEndurance(raw.endurance ?? 0)
                                setLuck(raw.luck ?? 3)
                                setItems(raw.inventoryItems ?? [])
                                setBackground(raw.background ?? DEFAULT_BACKGROUND)

                            } catch(err){
                                console.error(err)
                                alert("Invalid file")
                            }
                        }

                        reader.readAsText(file)
                    }

                    input.click()
                }

                // Local Save
                const SAVE_SLOTS = ["slot1","slot2","slot3"]
                const [activeSlot, setActiveSlot] = React.useState("slot1")
                const [saveMessage, setSaveMessage] = React.useState("")

                function buildSaveData(){
                    return {
                        name,
                        crew,
                        currentLevel,
                        levels,
                        level1,
                        levelStats,
                        levelSkills,
                        settings,
                        armor,
                        shield,
                        equippedWeapons,
                        inventoryWeapons,
                        health,
                        endurance,
                        luck,
                        items,
                        background,
                        version: 1.1,
                        timestamp: Date.now()
                    }
                }

                function saveToSlot(slot = activeSlot){
                    const data = buildSaveData()

                    localStorage.setItem(
                        `characterSheet_${slot}`,
                        JSON.stringify(data)
                    )

                    console.log(`Saved to ${slot}`, data)
                    setSaveMessage(`Saved to ${slot}`)
                }

                function loadFromSlot(slot = activeSlot){
                    const saved = localStorage.getItem(`characterSheet_${slot}`)

                    if(!saved){
                        console.log(`No save in ${slot}`)
                        setSaveMessage(`No save found in ${slot}`)
                        return
                    }

                    try{
                        const data = JSON.parse(saved)

                        console.log(`Loaded from ${slot}`, data)
                        setSaveMessage(`Loaded from ${slot}`)

                        setName(data.name ?? "")
                        setCrew(data.crew ?? "")
                        setCurrentLevel(data.currentLevel ?? 1)
                        setLevels(data.levels ?? Array(20).fill(null))
                        setLevel1(data.level1 ?? ["","",""])
                        setLevelStats(data.levelStats ?? levelStats)
                        setLevelSkills(data.levelSkills ?? levelSkills)
                        setSettings(data.settings ?? settings)
                        setArmor(data.armor ?? "No Armor")
                        setShield(data.shield ?? "No Shield")
                        setEquippedWeapons(data.equippedWeapons ?? [])
                        setInventoryWeapons(data.inventoryWeapons ?? [])
                        setHealth(data.health ?? 0)
                        setEndurance(data.endurance ?? 0)
                        setLuck(data.luck ?? 3)
                        setItems(data.items ?? [])
                        setBackground(data.background ?? background)

                    } catch(e){
                        console.error("Failed to load", e)
                        setSaveMessage("Failed to load save (invalid data)")
                    }
                }

                function clearSlot(slot = activeSlot){
                    const confirmDelete = window.confirm(
                        `Are you sure you want to clear ${slot}? This cannot be undone.`
                    )

                    if(!confirmDelete) return

                    localStorage.removeItem(`characterSheet_${slot}`)

                    console.log(`Cleared ${slot}`)
                    setSaveMessage(`Cleared ${slot}`)
                }

                React.useEffect(()=>{
                    loadFromSlot(activeSlot)
                }, [])

                // 5 minutes autosave
                React.useEffect(()=>{
                    const interval = setInterval(()=>{
                        saveToSlot(activeSlot)
                        console.log("Autosaved")
                    }, 300000) 

                    return ()=>clearInterval(interval)
                }, [activeSlot])

                React.useEffect(()=>{
                    if(!saveMessage) return

                    const t = setTimeout(()=>{
                        setSaveMessage("")
                    }, 3000)

                    return ()=>clearTimeout(t)
                }, [saveMessage])

                React.useEffect(()=>{
                    loadFromSlot(activeSlot)
                }, [activeSlot])

                return(
                    <div
                        className="app"
                        style={{
                            "--left-width": isLeftOpen ? "320px" : "60px"
                        }}
                    >
                    <TopBar
                        name={name}
                        setName={setName}
                        crew={crew}
                        setCrew={setCrew}
                        currentLevel={currentLevel}
                        setCurrentLevel={setCurrentLevel}
                        evasion={evasion}
                        endurance={endurance}
                        setEndurance={setEndurance}
                        minEndurance={minEndurance}
                        maxEndurance={maxEndurance}
                        toughness={toughness}
                        health={health}
                        setHealth={setHealth}
                        minHealth={minHealth}
                        maxHealth={maxHealth}
                        speed={speed}
                        dashSpeed={dashSpeed}
                        luck={luck}
                        maxLuck={maxLuck}
                        setLuck={setLuck}
                        settings={settings}
                        
                    />

                    <LeftPanel
                        finalStats={finalStats}
                        levelStats={levelStats}
                        setLevelStats={setLevelStats}
                        levels={levels}
                        setLevels={setLevels}
                        level1={level1}
                        setLevel1={setLevel1}
                        classCounts={classCounts}
                        getAvailableStatPoints={getAvailableStatPoints}
                        isOpen={isLeftOpen}
                        toggleOpen={()=>setIsLeftOpen(prev=>!prev)}
                    />

                    <MainPage
                        finalStats={finalStats}
                        classCounts={classCounts}
                        skillTotals={skillTotals}
                        currentLevel={currentLevel}
                        levelSkills={levelSkills}
                        setLevelSkills={setLevelSkills}
                        availableSkillPoints={availableSkillPoints}
                        armor={armor}
                        setArmor={setArmor}
                        shield={shield}
                        setShield={setShield}
                        useShield={useShield}
                        setUseShield={setUseShield}
                        shieldStats={shieldStats}
                        weapons={weapons}
                        equippedWeapons={equippedWeapons}
                        removeWeapon={removeWeapon}
                        inventoryWeapons={inventoryWeapons}
                        swapWeapon={swapWeapon}
                        weaponChoice={weaponChoice}
                        setWeaponChoice={setWeaponChoice}
                        addWeaponToInventory={addWeaponToInventory}
                        weaponTypeBonuses={weaponTypeBonuses}
                        items={items}
                        addItem={addItem}
                        updateItem={updateItem}
                        removeItem={removeItem}
                        settings={settings}
                        setSettings={setSettings}
                        sortBy={sortBy}
                        setSortBy={setSortBy}
                        sortedActionAbilities={sortedActionAbilities}
                        passiveAbilities={passiveAbilities}
                        background={background}
                        setBackground={setBackground}
                    />

                    <div style={{
                        position:"fixed",
                        bottom:"10px",
                        right:"10px",
                        display:"flex",
                        gap:"10px",
                        alignItems:"center"
                    }}>

                    <select
                        value={activeSlot}
                        onChange={e=>{
                            saveToSlot(activeSlot)
                            setActiveSlot(e.target.value)
                        }}
                    >
                        <option value="slot1">Slot 1</option>
                        <option value="slot2">Slot 2</option>
                        <option value="slot3">Slot 3</option>
                    </select>

                    <button onClick={()=>saveToSlot()}>Save</button>

                    <button onClick={exportData}>Export</button>
                    <button onClick={importData}>Import</button>

                    <button onClick={()=>clearSlot()}>Clear Save Slot</button> 

                    <div style={{
                        position:"fixed",
                        bottom:"45px",
                        right:"10px",
                        background:"#222",
                        color:"white",
                        padding:"6px 10px",
                        borderRadius:"4px",
                        fontSize:"12px"
                    }}>
                        {saveMessage}
                    </div>

                    </div>

                    </div>
                )
            }
            
            ReactDOM.createRoot(document.getElementById("root")).render(<App />);
        </script>
    </body>

</html>
